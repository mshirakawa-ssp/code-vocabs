<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>code-vocabs | IT 词汇学习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-flip { perspective: 1000px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; height: 100%; width: 100%; position: relative; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { 
            backface-visibility: hidden; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            border-radius: 1.5rem; 
            padding: 1.5rem;
        }
        .card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 text-slate-800 font-sans">

    <div class="max-w-xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black text-indigo-600 tracking-tighter">code-vocabs</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest style="letter-spacing: 0.1em;">Programming Japanese</p>
            </div>
            <select id="userType" class="bg-white border border-slate-200 text-[10px] font-bold rounded-lg px-2 py-1 outline-none focus:ring-2 ring-indigo-400">
                <option value="ja-learner">🇨🇳 我在学日语 (Learning JA)</option>
                <option value="zh-learner">🇯🇵 我在学中文 (Learning ZH)</option>
            </select>
        </header>

        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 mb-6">
            <label class="block text-[10px] font-black mb-2 text-slate-400 uppercase tracking-widest text-center">数据来源 (Sources)</label>
            <div id="sourceFilters" class="flex flex-wrap gap-2 mb-4 justify-center"></div>

            <label class="block text-[10px] font-black mb-2 text-slate-400 uppercase tracking-widest text-center">分类 (Categories)</label>
            <div id="categoryFilters" class="flex flex-wrap gap-2 mb-5 justify-center"></div>
            
            <div class="space-y-4 border-t border-slate-50 pt-4">
                <div class="flex items-center justify-between">
                    <div>
                        <span class="text-sm font-bold text-slate-700">复习模式 (Review Mode)</span>
                        <p class="text-[10px] text-orange-400 font-bold">只显示已标记的单词</p>
                    </div>
                    <label class="inline-flex relative items-center cursor-pointer">
                        <input type="checkbox" id="reviewModeToggle" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-400"></div>
                    </label>
                </div>

                <div class="flex items-center justify-between">
                    <div>
                        <span class="text-sm font-bold text-slate-700">自动播放 (Auto-Play)</span>
                        <p class="text-[10px] text-slate-400 italic">自动朗读并翻牌</p>
                    </div>
                    <button id="autoPlayToggle" class="px-6 py-2 bg-slate-800 text-white rounded-full text-xs font-black tracking-widest hover:bg-indigo-600 transition-all shadow-lg">开始</button>
                </div>
            </div>
        </section>

        <div class="card-flip w-full h-80 relative mb-6">
            <div id="cardInner" class="card-inner">
                <div class="card-front bg-white shadow-xl border border-white">
                    <span id="cardCategory" class="absolute top-4 left-6 text-[10px] font-black text-indigo-400 uppercase tracking-widest">Category</span>
                    <div class="text-center w-full">
                        <p id="frontRead" class="text-slate-300 text-sm md:text-lg mb-2 min-h-[1.5rem] font-medium leading-tight px-4"></p>
                        <h2 id="frontText" class="text-3xl md:text-5xl font-bold text-slate-700 tracking-tight break-words px-4">----</h2>
                    </div>
                    <p class="absolute bottom-6 text-[10px] font-bold text-slate-300 uppercase tracking-widest text-center w-full">点击翻面</p>
                </div>
                <div class="card-back bg-indigo-600 shadow-xl border border-indigo-500 text-white font-bold">
                    <div class="text-center w-full">
                        <p id="backRead" class="text-indigo-200 text-lg md:text-xl mb-2 min-h-[1.5rem] font-medium leading-tight px-4"></p>
                        <h2 id="backText" class="text-3xl md:text-5xl font-bold mb-4 tracking-tight break-words px-4">----</h2>
                        <div id="status" class="inline-block text-[10px] bg-indigo-500 px-3 py-1 rounded-full text-indigo-100 font-bold uppercase tracking-widest font-mono">ANSWER</div>
                    </div>
                    <p class="absolute bottom-6 text-[10px] font-bold text-indigo-300 uppercase tracking-widest text-center w-full">点击继续</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <button id="markBtn" class="col-span-1 py-4 bg-white border border-slate-200 text-slate-400 font-black text-xs rounded-2xl transition-all flex flex-col items-center justify-center gap-1 group">
                <span id="markIcon" class="text-xl group-hover:scale-110 transition-transform">⚠️</span>
                <span id="markText">标记</span>
            </button>
            <button id="nextBtn" class="col-span-2 py-4 bg-white border-b-4 border-slate-200 text-slate-800 font-black rounded-2xl hover:translate-y-[2px] hover:border-b-2 active:translate-y-[4px] active:border-b-0 transition-all flex items-center justify-center gap-2">
                下一个 <span class="text-indigo-500 ml-1">→</span>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
