<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン - 脆弱性診断システム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 380px; border-radius: 16px; border: none; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
  </style>
</head>
<body>
<div class="card login-card p-4">
  <div class="text-center mb-4">
    <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
    <h4 class="mt-2 mb-0">脆弱性診断システム</h4>
    <small class="text-muted">管理ダッシュボード</small>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="post">
    <div class="mb-3">
      <label class="form-label">ユーザー名</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">パスワード</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" class="form-control" required>
      </div>
    </div>
    <button type="submit" class="btn btn-primary w-100">
      <i class="bi bi-box-arrow-in-right me-2"></i>ログイン
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
