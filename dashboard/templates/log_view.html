{% extends "base.html" %}
{% block title %}実行ログ {{ scan_id }} - 脆弱性診断システム{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('scan_detail', scan_id=scan_id) }}" class="btn btn-sm btn-outline-secondary me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="mb-0">実行ログ</h2>
  <code class="ms-3 text-muted">{{ scan_id }}</code>
</div>

<div class="card">
  <div class="card-body p-0">
    <pre class="m-0 p-3" style="max-height: 70vh; overflow-y: auto; background: #1e1e1e; color: #d4d4d4; font-size: 0.82em; border-radius: 0 0 12px 12px;">{{ log_content }}</pre>
  </div>
</div>
{% endblock %}
