services:
  # ─── 管理ダッシュボード ────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://vulnscanner:${POSTGRES_PASSWORD}@db:5432/vulnscanner
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
    volumes:
      - ./reports:/app/reports
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=vulnscanner
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=vulnscanner
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnscanner"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ─── Scanner (必要時のみ起動: docker compose run scanner) ────────────────
  scanner:
    build:
      context: ./scanner
    volumes:
      - ./reports:/app/reports
    environment:
      - SCAN_ID=${SCAN_ID:-}
      - REPO_URL=${REPO_URL:-}
    profiles:
      - tools
    networks:
      - internal

  # ─── AI Agent (必要時のみ起動: docker compose run ai-agent) ─────────────
  ai-agent:
    build:
      context: ./ai-agent
    volumes:
      - ./reports:/app/reports
      - ./.env:/app/.env:ro
    environment:
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-qwen3.5}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - TARGET_BASE_URL=${TARGET_BASE_URL:-}
      - TARGET_USERNAME=${TARGET_USERNAME:-}
      - TARGET_PASSWORD=${TARGET_PASSWORD:-}
    profiles:
      - tools
    networks:
      - internal

  # ─── Reporter (必要時のみ起動: docker compose run reporter) ─────────────
  reporter:
    build:
      context: ./reporter
    volumes:
      - ./reports:/app/reports
    environment:
      - SCAN_ID=${SCAN_ID:-}
    profiles:
      - tools
    networks:
      - internal

volumes:
  pg_data:

networks:
  internal:
    driver: bridge
